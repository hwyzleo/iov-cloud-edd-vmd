mybatis-plus:
  type-aliases-package: net.hwyz.iov.cloud.edd.vmd.service.infrastructure.persistence.po

# MDM同步配置
mdm:
  sync:
    part:
      kafka:
        enabled: ${MDM_PART_KAFKA_ENABLED:true}
        topic: ${MDM_PART_KAFKA_TOPIC:mdm-part-events}
      scheduler:
        enabled: ${MDM_PART_SCHEDULER_ENABLED:true}
        cron: ${MDM_PART_SCHEDULER_CRON:0 0 */1 * * ?}  # 每小时执行一次
      monitoring:
        enabled: ${MDM_PART_MONITORING_ENABLED:true}
        alert:
          failure-threshold: ${MDM_PART_ALERT_FAILURE_THRESHOLD:5}  # 连续失败次数告警阈值
          delay-threshold-minutes: ${MDM_PART_ALERT_DELAY_THRESHOLD:30}  # 同步延迟告警阈值（分钟）